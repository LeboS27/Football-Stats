<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Full match statistics, goal timeline, betting trends and head-to-head comparison.">
  <title>Match Stats — FootStats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/stats.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <div id="header"></div>

  <main class="main-content" id="main">
    <!-- Match header + stats panel (rendered by MatchStats.mjs) -->
    <div id="match-container" class="container match-page"></div>

    <!-- Betting trends panel -->
    <section class="container card betting-section" id="betting-container" aria-label="Betting trends"></section>

    <!-- Head-to-Head panel -->
    <section class="container card h2h-section" id="h2h-container" aria-label="Head to head"></section>
  </main>

  <div id="footer"></div>

  <script type="module" src="/js/match.js"></script>
</body>
</html>
