<header class="site-header" role="banner">
  <div class="header-inner">
    <!-- Logo -->
    <a href="/" class="site-logo" aria-label="Football Stats Dashboard home">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2C12 2 8 6 8 12C8 18 12 22 12 22" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2C12 2 16 6 16 12C16 18 12 22 12 22" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2 12H22" stroke="currentColor" stroke-width="1.5"/>
        <path d="M3 7H21" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
        <path d="M3 17H21" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
      </svg>
      <span class="logo-text">FootStats</span>
    </a>

    <!-- League selector -->
    <div class="league-selector-wrap">
      <label for="league-select" class="sr-only">Select League</label>
      <select id="league-select" class="league-select" aria-label="Select league">
        <option value="47">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
        <option value="87">🇪🇸 La Liga</option>
        <option value="55">🇮🇹 Serie A</option>
        <option value="54">🇩🇪 Bundesliga</option>
        <option value="53">🇫🇷 Ligue 1</option>
        <option value="526">🌍 CAF Champions League</option>
      </select>
    </div>

    <!-- Search -->
    <div class="search-wrap" role="search">
      <label for="search-input" class="sr-only">Search teams and players</label>
      <div class="search-field">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="search"
          class="search-input"
          placeholder="Search teams or players…"
          autocomplete="off"
          aria-label="Search teams or players"
          aria-expanded="false"
          aria-controls="search-results"
        >
      </div>
      <div id="search-results" class="search-results" role="listbox" hidden></div>
    </div>

    <!-- Dark mode toggle -->
    <button id="dark-mode-toggle" class="icon-btn dark-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>

    <!-- Mobile menu toggle -->
    <button class="mobile-menu-toggle icon-btn" id="mobile-menu-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="main-nav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav id="main-nav" class="main-nav" aria-label="Main navigation">
    <a href="/"        class="nav-link" data-page="index">Fixtures</a>
    <a href="/match/"  class="nav-link" data-page="match">Match Stats</a>
    <a href="/team/"   class="nav-link" data-page="team">Teams</a>
    <a href="/player/" class="nav-link" data-page="player">Players</a>
  </nav>
</header>

<script>
  // Mobile menu toggle (inline so it works before JS bundle loads)
  document.getElementById('mobile-menu-toggle')?.addEventListener('click', function() {
    const nav = document.getElementById('main-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', String(!expanded));
    nav.classList.toggle('open', !expanded);
  });
</script>
