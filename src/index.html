<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Football Stats Dashboard — live scores, standings, player stats and betting trends for the world's top leagues.">
  <title>FootStats — Live Fixtures &amp; Standings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/stats.css">

  <!-- Favicon: football SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <div id="header"></div>

  <main class="main-content" id="main">
    <!-- Hero / Page title -->
    <div class="page-hero">
      <div class="page-hero-inner">
        <h1 class="page-title">Today's Fixtures</h1>
        <p class="page-subtitle">Live scores, results and upcoming matches</p>
      </div>
    </div>

    <!-- Homepage grid: fixtures + standings + leaderboard + news -->
    <div class="home-grid container">

      <!-- Left column: Fixtures -->
      <section class="home-fixtures-col" aria-labelledby="fixtures-heading">
        <h2 id="fixtures-heading" class="section-title">
          <span class="live-dot" aria-hidden="true"></span>
          Live &amp; Today
        </h2>
        <div id="fixtures-container" class="fixtures-list"></div>
      </section>

      <!-- Right column: Standings + Leaderboard -->
      <div class="home-right-col">
        <section aria-labelledby="standings-heading">
          <h2 id="standings-heading" class="section-title">Standings</h2>
          <div id="standings-container"></div>
        </section>

        <section aria-labelledby="leaderboard-heading">
          <h2 id="leaderboard-heading" class="section-title">Recent Results</h2>
          <div id="leaderboard-container" class="card recent-results-card"></div>
        </section>
      </div>
    </div>

    <!-- News section (full-width) -->
    <section class="news-section container" aria-labelledby="news-heading">
      <h2 id="news-heading" class="section-title">Latest News</h2>
      <div id="news-container" class="news-grid"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
